        text: >-
          The Lenna of Hobart Hotel was built in 1873 and owned by ship builder and merchant Alexander McGregor. Mr McGregor died in 1896 at his home, and some believe he still haunts the now-hotel with his wife Harriet. Jacques Imbriotis said Alex still hangs around there and treats it like his castle on top the hill, despite being dead for over a century.
