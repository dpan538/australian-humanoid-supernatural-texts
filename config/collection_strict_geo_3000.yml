schema_version: "2.1.0"
run_family: public_collection_with_strict_map_layer
target:
  public_display_records_goal: 2500-3000
  strict_map_records_goal: 1500
  accepted_net_new_source_items: 1500
  strict_geocoded_items_required: 1500
  minimum_non_ayr: 1350
  maximum_new_ayr: 150
  minimum_pre_1970: 450
  preferred_primary_or_institutional: 900
  preferred_publication_diversity: 120
  low_coverage_state_priority:
    - WA
    - NT
    - SA
    - TAS
    - VIC
  dominant_cluster_cap:
    Yowie: 0.45
batch_size: 50
counting_rule:
  accepted_record_must_have:
    - stable_public_url_or_identifier
    - source_title
    - publication_or_organisation
    - publication_date_or_explicit_date_note
    - access_date
    - source_type
    - source_tier
    - publicness_status
    - rights_access_note
    - substantive_evidence_summary_or_short_excerpt
    - narrative_type_or_secondary_role
    - australian_relationship
    - humanoid_basis
    - source_label_where_present
    - location_role
    - location_text_as_printed
    - latitude
    - longitude
    - geocode_source
    - geocode_verification_status
    - coordinate_evidence_note
    - ethics_review_status
    - cultural_sensitivity
    - duplicate_check_status
  public_display_record_may_have:
    - broad_region_or_state_location
    - unresolved_precise_coordinates
    - source_text_public_summary_only
    - ethics_review_status_not_yet_reviewed
  map_layer_requires:
    - latitude
    - longitude
    - verified_place_or_locality
    - location_role_not_publication_location
    - coordinate_evidence_note
  strict_geography_gate:
    accepted_values:
      geocode_verification_status:
        - verified_place
        - verified_locality
        - verified_gazetteer_point
        - verified_institutional_coordinate
      location_precision:
        - exact_site
        - town
        - locality
        - named_feature
    rejected_values:
      location_precision:
        - country
        - state_or_territory
        - broad_region
        - publication_location_only
        - uncertain
        - unknown
      location_role:
        - publication_location
        - source_collection_location
  not_counted:
    - unresolved_leads
    - metadata_only_catalogue_pointers
    - exact_duplicate_urls
    - search_result_snippets
    - controls
    - exclusions
    - inaccessible_pages_without_sufficient_evidence
    - ai_generated_summaries
    - records_without_substantive_public_text_or_summary
    - records_without_verified_coordinates_for_map_layer
view_contract:
  dashboard:
    includes:
      - strict_map_records
      - broad_or_review_location_records
      - public_display_records_without_coordinates
  density:
    includes:
      - strict_map_records
      - broad_or_review_location_records
      - public_display_records_without_coordinates
  map:
    includes:
      - strict_map_records_only
    excludes:
      - broad_or_review_location_records
      - publication_location_only
      - source_collection_location
      - no_coordinate_records
quality_classes:
  A:
    label: strict_primary_geocoded
    counts_toward_target: true
    description: Original or near-primary public source with a named Australian locality and verified coordinates.
  B:
    label: strict_institutional_geocoded
    counts_toward_target: true
    description: Public institutional, library, museum, heritage, park, or community-controlled public item with verified locality coordinates.
  C:
    label: strict_reputable_retelling_geocoded
    counts_toward_target: true
    description: Reputable media or local-history retelling with stable source chain, substantive narrative content, and verified coordinates.
  D:
    label: public_display_geography_incomplete
    counts_toward_target: true
    counts_toward_strict_map_target: false
    description: Relevant public item with substantive text/summary but broad, inferred, missing, or not-yet-geocoded location. Eligible for dashboard/density, not map.
  E:
    label: excluded_or_control
    counts_toward_target: false
    description: Duplicate, control, non-humanoid, inaccessible, restricted, metadata-only, or insufficient evidence item.
state_priority:
  - WA
  - SA
  - NT
  - TAS
  - ACT
  - VIC
  - QLD
  - NSW
date_bands:
  - before 1842
  - 1842-1875
  - 1876-1918
  - 1919-1945
  - 1946-1969
  - 1970-1999
  - 2000-present
source_priority:
  tier_a:
    - Trove article pages with article IDs and publication details
    - National Library of Australia digitized items
    - state library digitized collections
    - Internet Archive public-domain books and periodicals
    - original public newspapers, magazines, memoirs, local histories, and government reports
  tier_b:
    - AIATSIS public catalogue and public institutional guidance
    - community-controlled public resources
    - museums, galleries, parks, heritage authorities, and councils
  tier_c:
    - ABC
    - SBS
    - reputable national or local journalism
    - public oral-history and folklore projects
  discovery_only:
    - AYR
    - Wikipedia
    - tourism pages
    - paranormal directories
    - blogs and forums
figure_priority:
  reduce_dominance:
    - Yowie
    - Yahoo
  expand_non_yowie_public_labels:
    WA:
      - Wandjina
      - Wanjina
      - Hairy Man
      - wild man
    NT:
      - Mimih
      - Mimi
      - Garkain
      - Mokoi
      - Pangkarlangu
      - Mamu
      - Tjangara
    SA:
      - Mamu
      - Tjangara
      - ghost_legend
      - apparition_account
    VIC:
      - Nargun
      - Puttikan
      - ghost_legend
      - apparition_account
    TAS:
      - ghost_legend
      - apparition_account
      - local_legend
    QLD:
      - Quinkan
      - Quinkin
      - Yaroma
      - Yara-ma-yha-who
